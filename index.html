<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Search App</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="stylesheet" href="style/font-awesome.min.css">
</head>

<body>

  <div class="container">

    <div class="mainMenu">
      <img src="img/msa.jpg" alt="logo" class="mainLogo">
      <form action="" class="mainForm">
        <input type="text" placeholder="Поиск по сайту (На английском)" class="mainInput" required>
        <button class="mainButton">
          <i class="fa fa-search" aria-hidden="true"></i>
        </button>

      </form>
    </div>

    <div class="twoContainer">
      <div class="leftMenu">

        <div class="choiceMenu">
          <div class="choiceFilms">Фильмы</div>
          <div class="choiceSeries">Сериалы</div>
        </div>
      </div>

      <div class="rightMenu">
        <div class="infoForClient">
          <div class="loadingSearch">Ведём поиски...</div>
          <div class="errorSearch">Ой ёй... что-то пошло не так !</div>
        </div>

        <div class="listOfFilms">
 
        </div>

      </div>

    </div>


  </div>


  <script src="src/scrip.js"></script>
</body>

</html>
