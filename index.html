<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Search App</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="stylesheet" href="style/font-awesome.min.css">
</head>

<body>

  <div class="container">

    <div class="mainMenu">
      <img src="img/msa.jpg" alt="logo" class="mainLogo">
      <form action="" class="mainForm">
        <input type="text" placeholder="Поиск по сайту" class="mainInput" required>
        <button class="mainButton">
          <i class="fa fa-search" aria-hidden="true"></i>
        </button>

      </form>
    </div>

    <div class="twoContainer">
      <div class="leftMenu">

        <div class="choiceMenu">
          <div>Фильмы</div>
          <div>Сериалы</div>
        </div>
      </div>

      <div class="rightMenu">
        <div class="infoForClient">
          <div class="searchForMovies">Ведём поиски...</div>
          <div class="ErrorSearchForMovies">Ой ёй... что-то пошло не так !</div>
        </div>

        <div class="listOfFilms">
          <div class="cardOfFilm">
            <div class="posterOfFilm">
              <img src="img/photo_2026-01-09_18-54-16.jpg" alt="Poster">
            </div>
            <div class="nameOfFilm">Name</div>
            <div class="ageOfFilm">1990</div>
            
            </div>
        </div>

      </div>

    </div>


  </div>


  <script src="src/scrip.js"></script>
</body>

</html>
